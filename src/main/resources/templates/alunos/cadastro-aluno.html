<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="/css/form.css">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Cadastro de Alunos</h1>
        <p class="subtitulo">
            Preencha os dados abaixo para cadastrar um novo aluno.
        </p>
        <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">
            <div class="campo">
                <label for="nome">Nome do aluno</label>
                <input type="text" id="nome" th:field="*{nome}" placeholder="Digite o nome">
                <div class="erro" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
            </div>
            <div class="campo">
                <label for="matricula">Nº da Matrícula</label>
                <input type="text" id="matricula" th:field="*{matricula}" placeholder="Digite a matrícula">
                <div class="erro" th:if="${#fields.hasErrors('matricula')}" th:errors="*{matricula}"></div>
            </div>
            <button type="submit">Salvar</button>
            <div th:if="${mensagem}" class="sucesso">
                <span th:text="${mensagem}"></span>
            </div>
        </form>
        <a href="/" class="voltar">← Voltar para a página inicial</a>
        <a href="/alunos/show" class="voltar">← Voltar para a página de alunos</a>
    </div>
</div>
</body>
</html>
