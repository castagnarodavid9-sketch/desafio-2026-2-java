<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Status de Documentos</title>
    <link rel="stylesheet" href="/css/form.css">
</head>
<body>
<div class="container">
    <div class="card">
        <p class="subtitulo">
            Preencha os dados abaixo para cadastrar um novo status para o documento.
        </p>
        <h1>Cadastro Status de Documento</h1>
        <form action="/status/salvar" method="post">
            <div class="campo">
                <label for="nome">Descrição : </label>
                <input type="text" id="nome" name="nome" placeholder="Descrição do status" required>
            </div>
            <div class="campo">
                <label for="responsavel">Responsável:</label>
                <select id="responsavel" name="responsavel" required>
                    <option value="" selected disabled>Selecione um responsável</option>
                    <option value="Aluno">Aluno</option>
                    <option value="Secretaria">Secretaria</option>
                    <option value="Coordenação">Coordenação</option>
                    <option value="Professor">Professor</option>
                    <option value="Direção">Direção</option>
                </select>
            </div>
            <button type="submit">Salvar</button>
        </form>
        <a href="/" class="voltar">← Voltar para a página inicial</a>
        <a href="/status/show" class="voltar">← Voltar para a página de status</a>
    </div>
</div>
</body>
</html>
