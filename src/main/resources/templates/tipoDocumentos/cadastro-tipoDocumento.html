<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Tipos de Documentos</title>
    <link rel="stylesheet" href="/css/form.css">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Cadastro de Tipos de Documentos</h1>
        <form action="/tipoDocumento/salvar" method="post">
            <div class="campo">
                <label for="nome">Nome do documento</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o nome do novo documento" required>
            </div>
            <button type="submit">Salvar</button>
        </form>
        <a href="/" class="voltar">← Voltar para a página inicial</a>
        <a href="/tipoDocumento/show" class="voltar">← Voltar para a página de documentos</a>
    </div>
</div>
</body>
</html>
